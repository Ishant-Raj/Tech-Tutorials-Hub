<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Tutorials Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─── Header ─────────────────────────────────────────────────────────── -->
  <header class="hero">
    <div class="hero-content">
      <div class="hero-top">
        <div>
          <h1>Tech Tutorials Hub</h1>
          <p>Share technical tutorials with steps, code examples, ratings, and comments.</p>
        </div>

        <!-- FIX: Auth bar was completely missing from the original HTML.
             Users had no way to register, log in, or log out from the UI. -->
        <div class="auth-bar" id="authBar">
          <!-- Injected by script.js based on login state -->
        </div>
      </div>
    </div>
  </header>

  <!-- ─── Auth Modal ─────────────────────────────────────────────────────── -->
  <!-- FIX: Modal was missing — added for register/login flows. -->
  <div id="authModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Authentication">
    <div class="modal-box">
      <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>

      <div class="modal-tabs">
        <button class="tab-btn active" data-tab="login">Log In</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>

      <!-- Login form -->
      <form id="loginForm" class="auth-form">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••" required />
        </div>
        <p class="auth-error hidden" id="loginError"></p>
        <button type="submit" class="primary-btn">Log In</button>
      </form>

      <!-- Register form -->
      <form id="registerForm" class="auth-form hidden">
        <div class="field">
          <label for="regName">Name</label>
          <input type="text" id="regName" placeholder="Your name" required />
        </div>
        <div class="field">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="Min 6 characters" required />
        </div>
        <p class="auth-error hidden" id="registerError"></p>
        <button type="submit" class="primary-btn">Create Account</button>
      </form>
    </div>
  </div>
  <div id="modalOverlay" class="modal-overlay hidden"></div>

  <!-- ─── Main Content ────────────────────────────────────────────────────── -->
  <main class="container">

    <!-- Create Tutorial panel -->
    <section class="panel form-panel">
      <h2>Create Tutorial</h2>

      <!-- FIX: Login-required notice shown to logged-out users. -->
      <div id="loginNotice" class="login-notice hidden">
        <p>Please <button class="link-btn" id="loginPromptBtn">log in</button> to publish a tutorial.</p>
      </div>

      <form id="tutorialForm" class="tutorial-form">
        <div class="field">
          <label for="title">Tutorial Title</label>
          <input type="text" id="title" placeholder="e.g. Build a REST API with Node.js" required />
        </div>
        <div class="field">
          <label for="explanation">Explanation</label>
          <textarea id="explanation" rows="4" placeholder="Write a short explanation..." required></textarea>
        </div>
        <div class="field">
          <label for="steps">Steps <span class="hint">(one per line)</span></label>
          <textarea id="steps" rows="6" placeholder="Step 1&#10;Step 2&#10;Step 3" required></textarea>
        </div>
        <div class="field">
          <label for="code">Code Example</label>
          <textarea id="code" rows="8" placeholder="Paste your code here..."></textarea>
        </div>
        <div class="field">
          <label for="videoLink">Video Link <span class="hint">(optional)</span></label>
          <input type="url" id="videoLink" placeholder="https://youtube.com/..." />
        </div>
        <p class="auth-error hidden" id="formError"></p>
        <button type="submit" class="primary-btn">Publish Tutorial</button>
      </form>
    </section>

    <!-- Tutorials list panel -->
    <section class="panel tutorials-panel">
      <div class="section-head">
        <div>
          <h2>Community Tutorials</h2>
          <p>Highly rated tutorials are highlighted.</p>
        </div>
      </div>
      <div id="tutorialList" class="tutorial-list">
        <p class="empty-text">Loading tutorials…</p>
      </div>
    </section>
  </main>

  <!-- FIX: api.js must load BEFORE script.js so its functions are available. -->
  <script src="api.js"></script>
  <script src="script.js"></script>
</body>
</html>
